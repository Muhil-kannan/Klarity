version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klarity-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - klarity_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - klarity_net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klarity-worker
    restart: unless-stopped
    command: ["python", "-m", "app.jobs.worker"]
    env_file:
      - ./backend/.env
    volumes:
      - klarity_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - klarity_net

  redis:
    image: redis:7.4-alpine
    container_name: klarity-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - klarity_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: klarity-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./dashboard/.env.local
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - klarity_net

volumes:
  klarity_data:
  redis_data:

networks:
  klarity_net:
    driver: bridge
